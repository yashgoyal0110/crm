name: atlasiq

services:
  # --- PostgreSQL Database (with pgvector extension for embeddings) ---
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atlasiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-atlasiq}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - atlasiq
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atlasiq}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Uncomment to expose Postgres to host:
    # ports:
    #   - "5432:5432"

  # --- MinIO Object Storage ---
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-atlasiq}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    volumes:
      - minio_data:/data
    networks:
      - atlasiq
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Uncomment to expose MinIO to host:
    # ports:
    #   - "9000:9000"
    #   - "9001:9001"

  # --- Inngest Dev Server ---
  inngest:
    image: inngest/inngest:latest
    restart: unless-stopped
    command: inngest dev -u http://app:3000/api/inngest
    networks:
      - atlasiq
    # Uncomment to expose Inngest dashboard to host:
    # ports:
    #   - "8288:8288"

  # --- AtlasIQ Application ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3000"
    environment:
      # Database — values come from the same env vars as the postgres
      # service above so a single override changes both sides.
      DATABASE_URL: postgresql://${POSTGRES_USER:-atlasiq}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-atlasiq}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-atlasiq}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      DB_NAME: ${POSTGRES_DB:-atlasiq}

      # Auth
      BETTER_AUTH_URL: ${PUBLIC_APP_URL:-http://localhost:${APP_PORT:-3001}}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-replace-this-with-a-long-random-secret}

      # MinIO — values come from the same env vars as the minio service.
      NEXT_PUBLIC_MINIO_ENDPOINT: http://minio:9000
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PORT: "9000"
      MINIO_BUCKET: atlasiq
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-atlasiq}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}

      # Inngest
      INNGEST_DEV: "1"
      INNGEST_ID: atlasiq
      INNGEST_APP_NAME: AtlasIQ
      INNGEST_EVENT_KEY: local
      INNGEST_SIGNING_KEY: ""
      INNGEST_BASE_URL: http://inngest:8288

      # App
      NEXT_PUBLIC_APP_NAME: AtlasIQ
      NEXT_PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:${APP_PORT:-3001}}

      # Placeholder values for optional external services.
      # The app initializes these clients at module load time, so empty
      # values cause crashes. Users override these via .env to enable
      # the corresponding features. The app runs fine with placeholders;
      # individual features just won't work until real keys are provided.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder-replace-to-enable-ai}
      RESEND_API_KEY: ${RESEND_API_KEY:-re_placeholder_replace_to_enable_email}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      E2B_API_KEY: ${E2B_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      inngest:
        condition: service_started
    networks:
      - atlasiq
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  minio_data:

networks:
  atlasiq:
    driver: bridge
